name: Pipeline CI - Unified Data Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Configurar Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          # Garante que as dependências (incluindo pytest) sejam instaladas
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Caso não esteja no requirements, instalamos aqui por segurança
          pip install pytest pandas faker awswrangler 

      - name: Rodar Testes Unitários (Pytest)
        run: |
          # O segredo: 'python -m' adiciona automaticamente o diretório atual ao sys.path
          python -m pytest tests/test_pipeline.py
